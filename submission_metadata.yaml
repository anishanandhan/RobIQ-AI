# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"
  - "Cursor"

ai_usage_summary: |
  Used Claude/Cursor to assist with code structure, optimization, and honeypot detection rules. No candidate data was sent to external APIs.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  RedrObIQ is a fast, interpretable, feature-based ranking engine. It uses exact matching over 44 synthetically generated career templates (perfectly capturing role relevance weights), combines it with a custom skill proficiency scoring system (declared + endorsements + verified assessments), and applies a comprehensive behavioral multiplier. Includes a strict anomaly detector filtering out faked/impossible profiles (honeypots), service-company-only backgrounds, and international profiles. Runs in < 15 seconds on CPU.

