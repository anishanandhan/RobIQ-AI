name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Linter (Ruff)
        run: |
          ruff check .

      - name: Run Typechecker (Mypy)
        run: |
          mypy .

      - name: Run Unit Tests with Coverage
        run: |
          python -m pytest --cov=app --cov-report=xml --cov-fail-under=60

      - name: Run CLI Ranker Verification
        run: |
          python3 rank.py --candidates hf_space/sample_candidates.json --out test_out.csv --top 5
          test -f test_out.csv
          python3 validate_submission.py team_anish_semantic.csv

      - name: Upload Coverage Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
